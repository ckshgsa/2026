<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zootopia 心靈鑑定特區</title>
    <style>
        :root {
            --color-primary: #3498db; /* 哈茱蒂藍 */
            --color-secondary: #e67e22; /* 胡尼克橘 */
            --color-bg: #f0f4f8;
            --color-card: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--color-bg);
            color: #333;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* 滿版容器 */
        .container {
            width: 100%; max-width: 600px;
            padding: 20px;
        }

        /* 測驗卡片底座 */
        .card {
            background: var(--color-card);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            text-align: center;
            transition: all 0.4s ease;
        }

        /* 圖片泛用樣式 */
        .quiz-img {
            width: 100%; max-height: 250px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 頁面切換動畫 */
        .page { display: none; animation: fadeIn 0.4s ease-in-out forwards; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首頁酷炫樣式 */
        .main-title { font-size: 2.4rem; font-weight: 900; color: #2c3e50; margin: 10px 0; }
        .subtitle { font-size: 1.1rem; color: #7f8c8d; margin-bottom: 30px; }
        
        .start-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(45deg, var(--color-primary), #2980b9);
            color: white; border: none; border-radius: 50px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
            transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.02); }

        /* 進度條 */
        .progress-container {
            width: 100%; height: 6px; background: #e0e0e0;
            border-radius: 3px; margin-bottom: 30px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            transition: width 0.3s ease;
        }

        /* 題目樣式 */
        .question-text { font-size: 1.3rem; font-weight: bold; color: #2c3e50; margin-bottom: 25px; text-align: left; }
        
        /* 選項按鈕化 */
        .option-btn {
            display: block; width: 100%; text-align: left;
            padding: 16px 20px; margin-bottom: 12px;
            background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 14px;
            font-size: 1.05rem; cursor: pointer; transition: all 0.2s ease;
        }
        .option-btn:hover {
            background: #eaf2f8; border-color: var(--color-primary);
            transform: translateX(5px); color: #2980b9;
        }

        /* 結果頁面樣式 */
        .result-header { font-size: 1.2rem; color: #7f8c8d; }
        .result-title { font-size: 2.2rem; font-weight: 900; color: var(--color-secondary); margin: 10px 0 20px 0; }
        .result-desc { text-align: left; line-height: 1.8; background: #fff9f4; padding: 20px; border-left: 5px solid var(--color-secondary); border-radius: 8px; margin-bottom: 30px; }
        
        .retry-btn {
            padding: 12px 35px; background: #95a5a6; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
        }
        .retry-btn:hover { background: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <div id="page-0" class="page active">
            <img class="quiz-img" src="https://via.placeholder.com/600x300/34495e/ffffff?text=Zootopia+Welcome+Image" alt="首頁圖片">
            <h1 class="main-title">ZOOTOPIA</h1>
            <p class="subtitle">動物本性鑑定特區 ・ 測出你是哪種動物？</p>
            <button class="start-btn" onclick="nextPage(1)">開始鑑定 🐾</button>
        </div>

        <div id="progress-section" style="display: none;">
            <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        </div>

        <div id="page-1" class="page">
            <img class="quiz-img" src="https://via.placeholder.com/600x250/3498db/ffffff?text=Question+1+Image" alt="題目一圖片">
            <div class="question-text">1. 終於到了週末，你通常會怎麼安排你的休息時間？</div>
            <button class="option-btn" onclick="selectAnswer('A')">A. 安排滿滿計畫！去戶外運動、探索新地點。</button>
            <button class="option-btn" onclick="selectAnswer('B')">B. 在街頭商圈閒晃，發掘有趣事物與隱藏美食。</button>
            <button class="option-btn" onclick="selectAnswer('C')">C. 待在舒適室內，準備滿滿零食，追愛豆或影集。</button>
            <button class="option-btn" onclick="selectAnswer('D')">D. 處理未完成代辦事項或整理房間，保持井然有序。</button>
            <button class="option-btn" onclick="selectAnswer('E')">E. 睡到自然醒，然後慢⋯慢⋯享⋯受⋯早⋯餐⋯</button>
        </div>

        <div id="page-2" class="page">
            <img class="quiz-img" src="https://via.placeholder.com/600x250/e67e22/ffffff?text=Question+2+Image" alt="題目二圖片">
            <div class="question-text">2. 當遇到一個看起來「不可能解決」的難題時，你的第一反應是？</div>
            <button class="option-btn" onclick="selectAnswer('A')">A. 燃起鬥志！絕對不放棄，想盡辦法證明自己能做到。</button>
            <button class="option-btn" onclick="selectAnswer('B')">B. 轉個彎思考，找個聰明（甚至有點取巧）的捷徑搞定它。</button>
            <button class="option-btn" onclick="selectAnswer('C')">C. 感到有點焦慮，先找朋友訴苦，或者吃個甜點壓驚。</button>
            <button class="option-btn" onclick="selectAnswer('D')">D. 依照過往經驗、規定和 SOP 穩紮穩打處理。</button>
            <button class="option-btn" onclick="selectAnswer('E')">E. 不⋯著⋯急⋯，船⋯到⋯橋⋯頭⋯自⋯然⋯直⋯</button>
        </div>

        <div id="page-3" class="page">
            <img class="quiz-img" src="https://via.placeholder.com/600x250/2ecc71/ffffff?text=Question+3+Image" alt="題目三圖片">
            <div class="question-text">3. 在你的朋友圈裡，大家通常怎麼形容你？</div>
            <button class="option-btn" onclick="selectAnswer('A')">A. 充滿熱情、正義感爆棚的行動派。</button>
            <button class="option-btn" onclick="selectAnswer('B')">B. 幽默、嘴砲、看起來漫不經心但其實很講義氣。</button>
            <button class="option-btn" onclick="selectAnswer('C')">C. 超級友善、沒心機，是大家眼中的開心果。</button>
            <button class="option-btn" onclick="selectAnswer('D')">D. 嚴肅、有威嚴、出問題時總是可以依靠的領導者。</button>
            <button class="option-btn" onclick="selectAnswer('E')">E. 脾氣超級好、但生活節奏似乎總是跟別人不太一樣。</button>
        </div>

        <div id="page-4" class="page">
            <img class="quiz-img" src="https://via.placeholder.com/600x250/9b59b6/ffffff?text=Question+4+Image" alt="題目四圖片">
            <div class="question-text">4. 你心目中最理想的工作環境或生活狀態是什麼樣子？</div>
            <button class="option-btn" onclick="selectAnswer('A')">A. 充滿挑戰，能夠發揮影響力，甚至「讓世界變得更美好」！</button>
            <button class="option-btn" onclick="selectAnswer('B')">B. 自由不受拘束，不用看別人臉色，自己掌握步調。</button>
            <button class="option-btn" onclick="selectAnswer('C')">C. 氣氛輕鬆溫馨，同事朋友好相處，最重要是有吃不完的點心。</button>
            <button class="option-btn" onclick="selectAnswer('D')">D. 制度分明，大家各司其職，有明確的規矩和升遷管道。</button>
            <button class="option-btn" onclick="selectAnswer('E')">E. 步⋯調⋯平⋯緩⋯，不⋯需⋯要⋯每⋯天⋯趕⋯時⋯間⋯</button>
        </div>

        <div id="page-5" class="page">
            <img class="quiz-img" src="https://via.placeholder.com/600x250/f1c40f/ffffff?text=Question+5+Image" alt="題目五圖片">
            <div class="question-text">5. 走在路上，你突然看到前面的人錢包掉了，你會怎麼做？</div>
            <button class="option-btn" onclick="selectAnswer('A')">A. 立刻撿起來，不管多遠都狂奔追上去還給對方！</button>
            <button class="option-btn" onclick="selectAnswer('B')">B. 撿起來掂掂重量，笑著跟對方搭話開個玩笑後再還給他。</button>
            <button class="option-btn" onclick="selectAnswer('C')">C. 驚呼一聲，趕快撿起來，四處張望尋找失主。</button>
            <button class="option-btn" onclick="selectAnswer('D')">D. 撿起來，然後直接依照程序交到最近的警察局。</button>
            <button class="option-btn" onclick="selectAnswer('E')">E. 等⋯我⋯走⋯到⋯那⋯邊⋯，錢⋯包⋯已⋯被⋯人⋯撿⋯走⋯了⋯</button>
        </div>

        <div id="page-result" class="page">
            <div class="result-header">鑑定完成！你的隱藏動物人格是：</div>
            <img id="result-img" class="quiz-img" src="" alt="結果動物圖片">
            <h2 class="result-title" id="result-name"></h2>
            <div class="result-desc" id="result-desc"></div>
            <button class="retry-btn" onclick="restartQuiz()">再鑑定一次 🔄</button>
        </div>

    </div>
</div>

<script>
    let currentPage = 0;
    let userAnswers = [];

    // 結果資料庫（包含各個動物的專屬圖片位置，你可以直接替換裡面的 img 網址）
    const resultData = {
        'A': { 
            name: "🐰 哈茱蒂 (Judy Hopps)", 
            img: "https://via.placeholder.com/600x300/3498db/ffffff?text=🐰+Judy+Hopps+Image", // 👈 放哈茱蒂的圖
            desc: "充滿熱情的理想主義者！你就像茱蒂一樣，是個充滿活力、永不言敗的樂天派。你有著強烈的正義感和目標，一旦下定決心，沒有任何困難能阻擋你。你相信只要努力，就能讓世界變得更好！" 
        },
        'B': { 
            name: "🦊 胡尼克 (Nick Wilde)", 
            img: "https://via.placeholder.com/600x300/e67e22/ffffff?text=🦊+Nick+Wilde+Image", // 👈 放胡尼克的圖
            desc: "聰明機智的街頭生存專家！你擁有極高的情商和靈活的腦袋。你看透了社會的運作規則，懂得用幽默和圓滑來保護自己。表面玩世不恭，但其實你內心柔軟，對認定的朋友絕對挺到底。" 
        },
        'C': { 
            name: "🐆 洪金豹 (Benjamin Clawhauser)", 
            img: "https://via.placeholder.com/600x300/e74c3c/ffffff?text=🐆+Clawhauser+Image", // 👈 放洪金豹的圖
            desc: "溫慢友善的氣氛製造機！你是大家眼中的小天使，性格溫和、熱情且超級友善。在你身邊總能感到放鬆和快樂，雖然有時候容易分心，但你絕對是團隊表中最不可或缺的潤滑劑。" 
        },
        'D': { 
            name: "🐃 蠻牛局長 (Chief Bogo)", 
            img: "https://via.placeholder.com/600x300/2c3e50/ffffff?text=🐃+Chief+Bogo+Image", // 👈 放蠻牛局長的圖
            desc: "務實可靠的霸氣領導者！你做事講求效率、重視規則與秩序。有時候會讓人覺得有點嚴肅，但這都是因為你對自己和團隊有著極高的責任感。在危機時刻，你總是最能扛起重責大任的那個人。" 
        },
        'E': { 
            name: "🦥 快俠 (Flash)", 
            img: "https://via.placeholder.com/600x300/95a5a6/ffffff?text=🦥+Flash+Image", // 👈 放快俠的圖
            desc: "佛系生活的慢活大師！在這個急躁的世界裡，你擁有屬於自己的獨特節奏。你性格溫和、情緒穩定，幾乎沒有什麼事能讓你大發脾氣。其實你把一切都看在眼裡，可能還有著跌破眾人眼鏡的狂野嗜好！" 
        }
    };

    // 翻頁控制邏輯
    function nextPage(pageNumber) {
        // 隱藏目前頁面
        document.getElementById(`page-${currentPage}`).classList.remove('active');
        
        currentPage = pageNumber;

        // 顯示進度條控制
        if (currentPage >= 1 && currentPage <= 5) {
            document.getElementById('progress-section').style.display = 'block';
            document.getElementById('bar').style.width = `${(currentPage / 5) * 100}%`;
        } else {
            document.getElementById('progress-section').style.display = 'none';
        }

        // 顯示下一頁
        if (currentPage === 'result') {
            document.getElementById('page-result').classList.add('active');
        } else {
            document.getElementById(`page-${currentPage}`).classList.add('active');
        }
    }

    // 選擇答案並自動進下一題
    function selectAnswer(letter) {
        userAnswers.push(letter);
        
        if (currentPage < 5) {
            nextPage(currentPage + 1);
        } else {
            calculateFinalResult();
        }
    }

    // 計算最終高分結果
    function calculateFinalResult() {
        let scores = { 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'E': 0 };
        
        userAnswers.forEach(ans => scores[ans]++);

        let maxChar = 'A';
        let maxScore = 0;
        for (let char in scores) {
            if (scores[char] > maxScore) {
                maxScore = scores[char];
                maxChar = char;
            }
        }

        // 填入對應的結果資料與圖片
        document.getElementById('result-img').src = resultData[maxChar].img;
        document.getElementById('result-name').innerText = resultData[maxChar].name;
        document.getElementById('result-desc').innerText = resultData[maxChar].desc;

        nextPage('result');
    }

    // 重新開始
    function restartQuiz() {
        document.getElementById('page-result').classList.remove('active');
        userAnswers = [];
        currentPage = 0;
        document.getElementById('page-0').classList.add('active');
    }
</script>

</body>
</html>
