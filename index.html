<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 建功人請回答！！畢業限定心理測驗</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary-color: #4a5568; --bg-color: #f3f4f6; --card-bg: #ffffff; --sticker-color: rgba(203, 213, 224, 0.4); }
        * { box-sizing: border-box; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); color: #2d3748; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 550px; width: 100%; background: var(--card-bg); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); padding: 30px; text-align: center; border: 1px solid #e5e7eb; }
        .page-transition { animation: fadeInSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { color: #1a202c; font-size: 26px; margin-bottom: 12px; letter-spacing: 1px; }
        .subtitle { color: #1a202c; font-size: 14px; line-height: 1.6; margin-bottom: 30px; text-align: justify; padding: 0 10px; font-weight: 500; }
        .hidden { display: none !important; }
        .image-box { width: 100%; height: 250px; border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid #e2e8f0; background: #f8fafc; display: flex; justify-content: center; align-items: center; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; }
        .name-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid #e2e8f0; background: #ffffff; color: #1a202c; font-size: 16px; margin-bottom: 25px; outline: none; text-align: center; font-weight: bold; }
        .identity-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 15px 0 25px 0; padding: 20px; background: #fafafa; border-radius: 16px; border: 2px dashed #e2e8f0; }
        .sticker-btn { padding: 14px 24px; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 8px; font-weight: 800; font-size: 15.5px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(2px); }
        .progress-bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; position: relative; margin-bottom: 20px; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 4px; }
        .question-title { font-size: 20px; font-weight: bold; margin-bottom: 25px; color: #1f2937; text-align: left; }
        .option-btn { width: 100%; background: #f9fafb; border: 2px solid #e5e7eb; padding: 18px 20px; border-radius: 12px; text-align: left; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 16px; }
        .profile-card { background: #ffffff; border: 2px solid #1e293b; border-radius: 14px; padding: 25px; text-align: left; box-shadow: 5px 5px 0px #1e293b; }
        .action-btn { width: 100%; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; border: 2px solid #1e293b; background: #ffffff; }
    </style>
    <script>
        window.jgQuiz = {
            currentQuestionIndex: 0, selectedScores: [], userName: "",
            questions: [
                { title: "明天要考試，今天晚上我會選擇...", options: [{ text: "#想辦法捲死同學", score: "A" }, { text: "#與周公約會", score: "B" }] },
                { title: "考前我更願意相信...", options: [{ text: "#自己的智商", score: "C" }, { text: "#神明一定會幫助我的", score: "D" }] },
                { title: "關於上學...", options: [{ text: "#上課有認真聽", score: "C" }, { text: "#有來學校就很棒了", score: "B" }] },
                { title: "和朋友的相處...", options: [{ text: "#高山流水遇知音", score: "A" }, { text: "#低山臭水遇噪音", score: "D" }] },
                { title: "面對未來的困難...", options: [{ text: "#放馬過來", score: "A" }, { text: "#放我一馬", score: "D" }] }
            ],
            results: {
                "A": { name: "蠻牛局長", desc: "你是那個敢正面大喊「放馬過來」的絕對強者！目標明確、效率極高，畢業後絕對是開路先鋒。", colors: ["#dc2626"] },
                "B": { name: "兔子茱蒂", desc: "你抱持「有來學校就很棒了」的樂活態度，看似無害其實生命力爆棚，是全班的動能核心！", colors: ["#ca8a04"] },
                "C": { name: "狐狸尼克", desc: "考前淡定，因為你其實都有默默抓到重點，是班上的隱藏版大佬。", colors: ["#9333ea"] },
                "D": { name: "樹懶快俠", desc: "與世無爭、療癒爆表的避風港。總能用強大的冷幽默化解生活壓力。", colors: ["#16a34a"] }
            },
            switchPage: function(hideId, showId) {
                document.getElementById(hideId).classList.add('hidden');
                document.getElementById(showId).classList.remove('hidden');
            },
            selectIdentity: function(type) {
                if (!document.getElementById('user-name').value.trim()) { alert('請輸入姓名！'); return; }
                this.userName = document.getElementById('user-name').value.trim();
                this.switchPage('start-page', 'quiz-page');
                this.showQuestion();
            },
            showQuestion: function() {
                if (this.currentQuestionIndex >= this.questions.length) { this.showResult(); return; }
                const q = this.questions[this.currentQuestionIndex];
                document.getElementById('question-text').innerText = q.title;
                document.getElementById('progress-fill').style.width = ((this.currentQuestionIndex + 1) / this.questions.length) * 100 + '%';
                const box = document.getElementById('options-box'); box.innerHTML = '';
                q.options.forEach(opt => {
                    const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt.text;
                    btn.onclick = () => { this.selectedScores.push(opt.score); this.currentQuestionIndex++; this.showQuestion(); };
                    box.appendChild(btn);
                });
            },
            showResult: function() {
                this.switchPage('quiz-page', 'result-page');
                const counts = {}; let maxScore = "B"; let maxCount = 0;
                this.selectedScores.forEach(s => { counts[s] = (counts[s]||0)+1; if(counts[s]>maxCount){ maxCount=counts[s]; maxScore=s; } });
                document.getElementById('profile-card-box').innerHTML = `<h3>你是 ${this.results[maxScore].name}</h3><p>${this.results[maxScore].desc}</p>`;
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: this.results[maxScore].colors });
            },
            exportPDF: function() { html2pdf().from(document.getElementById('export-area')).save(); }
        };
    </script>
</head>
<body>
    <div class="container">
        <div id="start-page" class="page-transition">
            <h1>2026 建功人請回答！！</h1>
            <input type="text" id="user-name" class="name-input" placeholder="請輸入姓名">
            <div class="identity-container">
                <button class="sticker-btn silver" onclick="window.jgQuiz.selectIdentity('silver')">國中生</button>
                <button class="sticker-btn gold" onclick="window.jgQuiz.selectIdentity('gold')">高中生</button>
            </div>
        </div>
        <div id="quiz-page" class="hidden">
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
            <div class="question-title" id="question-text"></div>
            <div id="options-box"></div>
        </div>
        <div id="result-page" class="hidden">
            <div id="export-area"><div id="profile-card-box" class="profile-card"></div></div>
            <button class="action-btn" onclick="window.jgQuiz.exportPDF()">📥 匯出 PDF</button>
            <button class="action-btn" onclick="location.reload()">再測一次</button>
        </div>
    </div>
</body>
</html>
